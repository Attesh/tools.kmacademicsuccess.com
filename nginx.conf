server {
    listen 80;
    server_name tools.kmacademicsuccess.com;
    
    client_max_body_size 100M;
    
    access_log /var/log/nginx/tools_access.log;
    error_log /var/log/nginx/tools_error.log;
    
    location / {
        proxy_pass http://km-tools-flask:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    location /static/ {
        alias /var/www/tools.kmacademicsuccess.com/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location /health {
        proxy_pass http://km-tools-flask:5000/health;
        access_log off;
    }
}